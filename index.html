<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cipher — Private Translator</title>
<meta name="description" content="Cipher: a privacy-first translator. Legal and support pages.">
<style>
  :root { --ink:#16181d; --muted:#5b6270; --line:#e6e8ec; --accent:#4f46e5; --bg:#ffffff; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--ink);
         font:400 17px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .card { max-width:460px; padding:40px 26px; text-align:center; }
  .dot { width:54px; height:54px; border-radius:14px; background:linear-gradient(135deg,#4f46e5,#7c6cf6); margin:0 auto 18px; }
  h1 { font-size:26px; margin:0 0 6px; letter-spacing:-.3px; }
  p { color:var(--muted); margin:0 0 26px; }
  .links a { display:block; padding:14px 18px; margin:10px 0; border:1px solid var(--line); border-radius:12px; text-decoration:none; color:var(--ink); font-weight:500; }
  .links a:hover { border-color:var(--accent); color:var(--accent); }
  small { display:block; margin-top:26px; color:var(--muted); }
  small a { color:var(--muted); }
</style>
</head>
<body>
  <div class="card">
    <div class="dot" aria-hidden="true"></div>
    <h1>Cipher</h1>
    <p>Private translator &mdash; your words stay on your device.</p>
    <div class="links">
      <a href="/privacy/">Privacy Policy</a>
      <a href="/terms/">Terms of Use</a>
      <a href="/support/">Support &amp; FAQ</a>
    </div>
    <small>Questions? <a href="mailto:Info@boostmybiz.ai">Info@boostmybiz.ai</a></small>
  </div>
</body>
</html>
